<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Confluent Logical Types Playground</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Confluent Logical Types Playground</h1>
    <div class="header-controls">
      <div class="dropdown" id="examples-dropdown">
        <button class="dropdown-button" id="examples-button" aria-haspopup="true" aria-expanded="false">
          Examples ▾
        </button>
        <ul class="dropdown-menu" id="examples-menu" role="menu" hidden></ul>
      </div>
      <div class="toggle" role="radiogroup" aria-label="Output target">
        <button data-target="avro" class="active">Avro</button>
        <button data-target="json">JSON Schema</button>
        <button data-target="protobuf">Protobuf</button>
      </div>
    </div>
  </header>
  <main>
    <section class="pane">
      <div class="tab-strip" id="tab-strip" role="tablist" aria-label="DDL documents"></div>
      <div class="editor-wrap">
        <div id="editor"></div>
        <div class="editor-placeholder" id="editor-placeholder" hidden aria-hidden="true">
          <span>-- start typing your logical types DDL here</span>
          <span>-- or pick a starter snippet from <strong>Examples</strong> above</span>
        </div>
      </div>
    </section>
    <section class="pane">
      <div class="pane-label" id="output-label">Avro</div>
      <div id="output"></div>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
  <script src="app.js"></script>
</body>
</html>
